<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Open+Sans:wght@400;600;700&display=swap">

<style>
  /* =========================================================================
     2. 全站字体大洗牌：强制应用 Open Sans / Lato，彻底清除方正生硬感
     ========================================================================= */
  *, *::before, *::after {
    font-family: "Open Sans", "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif !important;
    color: #2c2c2c !important; /* 优雅深灰，告别死黑 */
  }

  /* =========================================================================
     3. 规范正文排版（字间距、高信息密度）
     ========================================================================= */
  p, li {
    line-height: 1.75 !important;
    font-size: 15.5px !important;
    letter-spacing: 0.01em !important; /* 微调字距，更具呼吸感 */
  }

  /* =========================================================================
     4. 标题优雅化（600半粗体，圆润修长，自带淡灰色学术分割线）
     ========================================================================= */
  h1, h2, h3, h4 {
    color: #111111 !important;
    font-weight: 600 !important; /* 锁死600字重，饱满而不臃肿 */
    margin-top: 1.8em !important;
    margin-bottom: 0.6em !important;
  }

  h2 {
    border-bottom: 1px solid #e1e4e8 !important; /* 复刻大牛同款标题下划线 */
    padding-bottom: 0.3em !important;
  }

  /* =========================================================================
     5. 彻底解决头像虚化、闪烁问题（全状态 100% 不透明锁死）
     ========================================================================= */
  .author__avatar, 
  .author__avatar img, 
  .author__avatar:hover img,
  .sidebar .author__avatar img {
    opacity: 1 !important;
    filter: none !important;
    -webkit-filter: none !important;
    transition: none !important; /* 拔掉所有鼠标悬停变亮的动画 */
  }

  /* =========================================================================
     6. 拯救横向长条状 NUS Logo，使其自然放大、不再缩成一团
     ========================================================================= */
  .masthead__logo img {
    max-height: 65px !important;   /* 高度松绑到 65px，横向长 Logo 会等比例舒展变大 */
    height: auto !important;
    width: auto !important;
  }
  .masthead__logo {
    padding-top: 6px !important;    /* 微调顶栏上下边距，防止大 Logo 顶格 */
    padding-bottom: 6px !important;
  }

  /* =========================================================================
     7. 锁死全局根字号防线（降维打击全屏时字号无限膨胀的 Bug）
     ========================================================================= */
  html {
    font-size: 16px !important;     /* 焊死根字号，大屏下不膨胀，小屏下不缩水 */
  }
</style>
