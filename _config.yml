# =========================================================================
# 站点核心全局配置 (Site Settings)
# =========================================================================
locale                   : "en-US"
title                    : "Shuyang Wu"
title_separator          : "-"
subtitle                 : "PhD Student at NUS"
name                     : "Shuyang Wu"
description              : "Academic homepage of Shuyang Wu. Trying to build the world with Tech!"
url                      : "https://ShuyangWu-AI4S.github.io" 
baseurl                  : ""
repository               : "ShuyangWu-AI4S/ShuyangWu-AI4S.github.io"

# =========================================================================
# 远程主题定义 (Theme Settings)
# =========================================================================
theme                    : "minimal-mistakes-jekyll"
remote_theme             : "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin    : "contrast" 

# =========================================================================
# 侧边栏个人资料卡配置 (Site Author Profile)
# =========================================================================
author:
  name             : "Shuyang Wu"
  avatar           : "/assets/images/avatar.jpg" 
  bio              : "PhD Student at National University of Singapore. Research interests: AI for Science (AI4S), Physics-Informed Operator Learning, Spatiotemporal Representative Learning, Inverse Problems & Digital Twin, Distributed Optical Fiber Sensing(DOFS) ."
  location         : "Singapore"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your-email@u.nus.edu"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ShuyangWu-AI4S"

# =========================================================================
# 默认渲染控制 (Defaults for Markdown Parsing)
# =========================================================================
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true 
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true

# =========================================================================
# 插件使能声明 (Plugins)
# =========================================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme
