# =========================================================================
# 站点核心全局配置 (Site Settings)
# =========================================================================
locale                   : "zh-CN"
title                    : "Shuyang Wu"
title_separator          : "-"
subtitle                 : "PhD Student at NUS"
name                     : "Shuyang Wu"
description              : "Academic homepage of Shuyang Wu. Focusing on AI4S and Distributed Acoustic Sensing."
url                      : "https://<您的GitHub用户名>.github.io" # 替换为您的实际域名
baseurl                  : ""
repository               : "<您的GitHub用户名>/<您的GitHub用户名>.github.io"

# =========================================================================
# 远程主题定义 (Theme Settings)
# =========================================================================
theme                    : "minimal-mistakes-jekyll"
remote_theme             : "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin    : "contrast" # 推荐学术风皮肤：contrast（高对比白底黑字）或 default

# =========================================================================
# 侧边栏个人资料卡配置 (Site Author Profile)
# =========================================================================
author:
  name             : "Shuyang Wu"
  avatar           : "/assets/images/avatar.jpg" # 稍后上传的个人头像路径
  bio              : "PhD Student at National University of Singapore. Research interests: AI for Science (AI4S), Distributed Acoustic Sensing (DAS), and Fluid Dynamics."
  location         : "Singapore"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:your-email@u.nus.edu"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/<您的GitHub用户名>"

# =========================================================================
# 默认渲染控制 (Defaults for Markdown Parsing)
# =========================================================================
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true # 默认全量页面左侧强制挂载个人资料卡
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: true

# =========================================================================
# 插件使能声明 (Plugins)
# =========================================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme
